name: plugin-validation

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate plugin manifests, skills, hooks, README links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # shellcheck and jq ship on ubuntu-latest today, but the lint and sweep steps
      # below would error rather than fail loudly if a future runner image drops them.
      - name: Ensure lint tooling
        run: |
          missing=()
          command -v shellcheck >/dev/null 2>&1 || missing+=(shellcheck)
          command -v jq >/dev/null 2>&1 || missing+=(jq)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "installing: ${missing[*]}"
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          fi
          shellcheck --version | head -2
          jq --version

      - name: Run validate-plugin.py
        run: ./scripts/validate-plugin.py

      - name: Run unit tests
        run: python3 -m unittest discover tests -v

      - name: Lint shell scripts
        run: shellcheck -S warning hooks/session-start hooks/pre-compact scripts/*.sh

      - name: jq schema sweep
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty .claude-plugin/marketplace.json
          jq empty hooks/hooks.json
          jq empty package.json
          jq empty config/defaults.json
          jq empty config/schema.json
          jq empty config/features.json
          jq empty config/features.schema.json

      - name: Every SKILL.md has an h1 in its body
        run: |
          fail=0
          while IFS= read -r f; do
            body=$(awk '/^---$/{c++; next} c>=2{print}' "$f")
            if ! printf '%s' "$body" | grep -qE '^# '; then
              echo "FAIL  $f has no h1 heading in body" >&2
              fail=1
            fi
          done < <(find skills -name SKILL.md)
          exit "$fail"

      - name: Hook scripts are executable
        run: |
          fail=0
          for script in hooks/*; do
            case "$script" in
              *.json|*.md) ;;
              *)
                if [[ -f "$script" && ! -x "$script" ]]; then
                  echo "FAIL  hook script not executable: $script" >&2
                  fail=1
                fi
                ;;
            esac
          done
          exit "$fail"

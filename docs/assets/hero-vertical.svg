  <text x="44" y="160" fill="#14110C" font-size="11.5" font-weight="400" text-anchor="start" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">INIT ONCE · scaffold sets up the project</text>

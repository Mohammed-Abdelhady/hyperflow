<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 880" width="760" height="880"
     role="img" aria-labelledby="t d" font-family="'Space Grotesk', ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <title id="t">Hyperflow v5.22.0</title>
  <desc id="d">Rules, multi-session memory, templates, and a reviewed multi-agent chain for AI coding CLIs — first init once with scaffold, then the chain stacked top to bottom: plan, dispatch, audit, deploy, with review matched to the selected execution path.</desc>
  <defs>
